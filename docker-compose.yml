services:
  backend:
    build:
      context: ./backend
    container_name: sgpa_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=sqlite:////app/instance/sgpa.db
      - LLM_API_KEY=${LLM_API_KEY}
    volumes:
      - ./backend/instance:/app/instance

  frontend:
    build:
      context: ./frontend
    container_name: sgpa_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
